name: Unit tests

# =============================================================================
# NOTICE: This workflow is now part of the RAFAELIA unified pipeline.
# Direct triggers are disabled to prevent duplicate builds.
# The main pipeline is: rafaelia_pipeline.yml
# =============================================================================

on:
  # Disabled direct triggers - use rafaelia_pipeline.yml instead
  # push:
  #   branches:
  #     - master
  #     - android-10
  # pull_request:
  #   branches:
  #     - master
  #     - android-10
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual test run'
        required: false
        type: string

jobs:
  testing:
    runs-on: ubuntu-latest
    steps:
    - name: "📥 Phase 1: Clone repository"
      uses: actions/checkout@v6
    - name: "☕ Phase 2: Setup Java 17"
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'
    - name: "🤖 Phase 2.1: Setup Android SDK/NDK"
      uses: android-actions/setup-android@v3
    - name: "📦 Phase 2.2: Install Android toolchain components"
      run: |
        ./scripts/setup_android_toolchain.sh
    - name: "🧭 Phase 2.3: Ensure local.properties sdk.dir"
      run: |
        ./scripts/ensure_android_sdk.sh
    - name: "🧬 Phase 2.3: Validate side-by-side contract"
      run: |
        ./gradlew :app:validateSideBySideContract --no-daemon
    - name: "🧪 Phase 3: Execute unit tests"
      run: |
        echo "=========================================="
        echo "Running unit tests"
        echo "=========================================="
        ./gradlew test
        echo ""
        echo "=========================================="
        echo "TESTS COMPLETED"
        echo "=========================================="
    - name: "🧭 Phase 4: RAFAELIA smoke checks + code inventory"
      run: |
        ./scripts/rafaelia_ci_smoke.sh
    - name: "📦 Phase 5: Upload generated code inventory"
      uses: actions/upload-artifact@v4
      with:
        name: source-code-inventory
        path: INVENTARIO_CODIGO_FONTE.md
