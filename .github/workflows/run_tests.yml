name: Unit tests

# =============================================================================
# NOTICE: This workflow is now part of the RAFAELIA unified pipeline.
# Direct triggers are disabled to prevent duplicate builds.
# The main pipeline is: rafaelia_pipeline.yml
# =============================================================================

on:
  # Disabled direct triggers - use rafaelia_pipeline.yml instead
  # push:
  #   branches:
  #     - master
  #     - android-10
  # pull_request:
  #   branches:
  #     - master
  #     - android-10
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual test run'
        required: false
        type: string

jobs:
  testing:
    runs-on: ubuntu-latest
    steps:
    - name: "📥 Phase 1: Clone repository"
      uses: actions/checkout@v6
    - name: "☕ Phase 2: Setup Java 17"
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'
    - name: "🤖 Phase 2.1: Setup Android SDK/NDK"
      uses: android-actions/setup-android@v3
    - name: "📦 Phase 2.2: Install Android toolchain components"
      run: |
        COMPILE_SDK_VERSION=$(grep -E '^compileSdkVersion=' gradle.properties | head -n1 | cut -d= -f2- | tr -d '[:space:]')
        NDK_VERSION=$(grep -E '^ndkVersion=' gradle.properties | head -n1 | cut -d= -f2- | tr -d '[:space:]')
        BUILD_TOOLS_VERSION=$(grep -E '^buildToolsVersion=' gradle.properties | head -n1 | cut -d= -f2- | tr -d '[:space:]')
        if [ -z "$COMPILE_SDK_VERSION" ] || [ -z "$NDK_VERSION" ]; then
          echo "❌ Missing compileSdkVersion/ndkVersion in gradle.properties"
          exit 1
        fi
        if [ -z "$BUILD_TOOLS_VERSION" ]; then
          BUILD_TOOLS_VERSION="${COMPILE_SDK_VERSION}.0.0"
        fi

        yes | sdkmanager --licenses > /dev/null
        sdkmanager \
          "platform-tools" \
          "platforms;android-${COMPILE_SDK_VERSION}" \
          "build-tools;${BUILD_TOOLS_VERSION}" \
          "ndk;${NDK_VERSION}" \
          "cmake;3.22.1"
    - name: "🧪 Phase 3: Execute unit tests"
      run: |
        echo "=========================================="
        echo "Running unit tests"
        echo "=========================================="
        ./gradlew test
        echo ""
        echo "=========================================="
        echo "TESTS COMPLETED"
        echo "=========================================="
