name: RafCodePhi Beta Build

on:
  push:
  workflow_dispatch:

jobs:
  beta-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses and install SDK/NDK
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" "ndk;26.3.11579264"

      - name: Build debug APK
        run: ./gradlew --no-daemon assembleDebug

      - name: Generate SHA256
        run: |
          mkdir -p artifacts
          find app/build/outputs/apk -name '*.apk' -print0 | xargs -0 -I{} cp {} artifacts/
          (cd artifacts && sha256sum *.apk > SHA256SUMS.txt)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rafcodephi-beta-artifacts
          path: |
            artifacts/*.apk
            artifacts/SHA256SUMS.txt
            docs/BETA_BUILD_REPORT.md
            docs/BETA_READINESS_REPORT.md
