name: APK Matrix Build (signed + unsigned)

on:
  workflow_dispatch:

jobs:
  build-apk-matrix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK/NDK
        run: ./scripts/setup_android_toolchain.sh

      - name: Build signed + unsigned APK matrix
        run: ./scripts/build_apk_matrix.sh

      - name: Publish APK size report in workflow summary
        run: |
          echo "## APK Matrix Size Report" >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
          cat dist/apk-matrix/APK_SIZE_REPORT.tsv >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
          echo "## Release Signed vs Unsigned Size Diff" >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
          cat dist/apk-matrix/APK_SIZE_DIFF_RELEASE.tsv >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY

      - name: Upload unsigned APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: termux-apk-matrix-unsigned-${{ github.sha }}
          path: |
            dist/apk-matrix/unsigned/*.apk
          if-no-files-found: error

      - name: Upload signed APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: termux-apk-matrix-signed-${{ github.sha }}
          path: |
            dist/apk-matrix/signed/*.apk
          if-no-files-found: error

      - name: Upload reports and checksums
        uses: actions/upload-artifact@v4
        with:
          name: termux-apk-matrix-reports-${{ github.sha }}
          path: |
            dist/apk-matrix/APK_SIZE_REPORT.tsv
            dist/apk-matrix/APK_SIZE_DIFF_RELEASE.tsv
            dist/apk-matrix/SHA256SUMS.txt
            dist/apk-matrix/ARTIFACT_MANIFEST.txt
          if-no-files-found: error

      - name: Upload local signing keystore
        uses: actions/upload-artifact@v4
        with:
          name: termux-apk-matrix-local-keystore-${{ github.sha }}
          path: |
            dist/local-release.keystore
          if-no-files-found: error
