name: "Validate Gradle Wrapper"

on:
  push:
    branches:
      - master
      - android-10
  pull_request:
    branches:
      - master
      - android-10
  workflow_dispatch:

jobs:
  validation:
    name: "Validation"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@5
