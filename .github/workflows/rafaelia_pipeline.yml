# =============================================================================
# RAFAELIA Orchestrated Pipeline - Unified CI/CD Workflow
# =============================================================================
#
# This is the SINGLE ENTRY POINT for all CI/CD operations in this repository.
# It implements the RAFAELIA methodology cycle (ψχρΔΣΩ) with sequential stages.
#
# Stages:
#   ψ (Psi)   - Perception: Quality gate, validation, gradle wrapper check
#   χ (Chi)   - Feedback: Security scan, dependency check
#   ρ (Rho)   - Expansion: Build ARM64 first (debug + release), then other ABIs
#   Δ (Delta) - Validation: Run unit tests
#   Σ (Sigma) - Execution: Android 15 compatibility validation
#   Ω (Omega) - Alignment: Artifact upload and final quality report
#
# Best Practices Implemented:
#   - Single trigger point to avoid duplicate builds
#   - Concurrency control to ensure sequential execution
#   - ARM64 prioritized builds (v8a first)
#   - Debug and Release builds in sequence
#   - Guaranteed APK output with continue-on-error for non-critical steps
#
# =============================================================================

name: "🔄 RAFAELIA Pipeline (ψχρΔΣΩ)"

on:
  push:
    branches:
      - master
      - main
      - 'android-15/**'
      - 'arm64/**'
      - 'github-releases/**'
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'art/**'
      - 'site/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/FUNDING.yml'
  pull_request:
    branches:
      - master
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'art/**'
      - 'site/**'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'both'
        type: choice
        options:
          - debug
          - release
          - both
      skip_tests:
        description: 'Skip Tests'
        required: false
        default: false
        type: boolean
      package_variant:
        description: 'Package Variant (empty = both)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - apt-android-7
          - apt-android-5

# Critical: Concurrency control ensures only one pipeline runs at a time per branch
# This prevents multiple simultaneous builds from the same push
concurrency:
  group: rafaelia-pipeline-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'
  COMPILE_SDK_VERSION: 35
  TARGET_SDK_VERSION: 28
  NDK_VERSION: '26.3.11579264'

permissions:
  contents: read

jobs:
  # ===========================================================================
  # ψ (PSI) - PERCEPTION STAGE
  # Quality gate and initial validation
  # ===========================================================================
  psi-perception:
    name: "ψ Perception - Quality Gate"
    runs-on: ubuntu-latest
    outputs:
      should_continue: ${{ steps.quality-check.outputs.should_continue }}
      version_name: ${{ steps.version.outputs.version_name }}
      version_tag: ${{ steps.version.outputs.version_tag }}
      build_debug: ${{ steps.build-config.outputs.build_debug }}
      build_release: ${{ steps.build-config.outputs.build_release }}
      variants: ${{ steps.build-config.outputs.variants }}

    steps:
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: "🔍 Quality Check - Critical Files"
        id: quality-check
        run: |
          echo "=========================================="
          echo "ψ PERCEPTION - Quality Gate"
          echo "=========================================="
          echo ""
          
          CRITICAL_FILES=(
            "app/build.gradle"
            "gradle.properties"
            "settings.gradle"
            "gradlew"
          )
          
          MISSING_FILES=0
          for file in "${CRITICAL_FILES[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ Missing: $file"
              MISSING_FILES=1
            else
              echo "✓ Found: $file"
            fi
          done
          
          if [ $MISSING_FILES -eq 1 ]; then
            echo "should_continue=false" >> $GITHUB_OUTPUT
            echo ""
            echo "❌ Quality gate FAILED - missing critical files"
            exit 1
          fi
          
          echo "should_continue=true" >> $GITHUB_OUTPUT
          echo ""
          echo "✅ Quality gate PASSED"

      - name: "🧩 Validate Native Module Structure"
        run: |
          python3 scripts/validate_native_structure.py

      - name: "✅ Validate Gradle Wrapper"
        uses: gradle/actions/wrapper-validation@v6

      - name: "🕒 Validate MVP Metadata Timestamp"
        run: |
          ./scripts/mvp_metadata_timestamp.sh validate


      - name: "📋 Extract Version Information"
        id: version
        run: |
          VERSION_NAME=$(grep -m 1 'versionName "' app/build.gradle | sed -E 's/.*versionName "([^"]+)".*/\1/')
          
          if [ "$GITHUB_EVENT_NAME" == "pull_request" ]; then
            COMMIT_SHA="${{ github.event.pull_request.head.sha }}"
          else
            COMMIT_SHA="$GITHUB_SHA"
          fi
          
          VERSION_TAG="v${VERSION_NAME}+${COMMIT_SHA:0:7}"
          
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_tag=$VERSION_TAG" >> $GITHUB_OUTPUT
          
          echo "Version Name: $VERSION_NAME"
          echo "Version Tag: $VERSION_TAG"

      - name: "⚙️ Determine Build Configuration"
        id: build-config
        run: |
          # Determine build types
          BUILD_INPUT="${{ github.event.inputs.build_type || 'both' }}"
          
          if [ "$BUILD_INPUT" == "debug" ]; then
            echo "build_debug=true" >> $GITHUB_OUTPUT
            echo "build_release=false" >> $GITHUB_OUTPUT
          elif [ "$BUILD_INPUT" == "release" ]; then
            echo "build_debug=false" >> $GITHUB_OUTPUT
            echo "build_release=true" >> $GITHUB_OUTPUT
          else
            echo "build_debug=true" >> $GITHUB_OUTPUT
            echo "build_release=true" >> $GITHUB_OUTPUT
          fi
          
          # Determine package variants
          VARIANT_INPUT="${{ github.event.inputs.package_variant }}"
          if [ -z "$VARIANT_INPUT" ]; then
            echo 'variants=["apt-android-7", "apt-android-5"]' >> $GITHUB_OUTPUT
          else
            echo "variants=[\"$VARIANT_INPUT\"]" >> $GITHUB_OUTPUT
          fi

  # ===========================================================================
  # χ (CHI) - FEEDBACK STAGE
  # Security scan and dependency analysis
  # ===========================================================================
  chi-feedback:
    name: "χ Feedback - Security Check"
    needs: psi-perception
    if: needs.psi-perception.outputs.should_continue == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v6

      - name: "☕ Setup Java"
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: "🔐 Security Check - 16KB Page Alignment"
        run: |
          echo "=========================================="
          echo "χ FEEDBACK - Security & Compatibility"
          echo "=========================================="
          echo ""
          
          echo "Checking 16KB page alignment configuration..."
          
          if grep -q "max-page-size=16384" app/build.gradle; then
            echo "✓ 16KB page alignment configured in app/build.gradle"
          else
            echo "⚠ Warning: 16KB page alignment may need review"
          fi
          
          if [ -f "app/src/main/cpp/Android.mk" ]; then
            if grep -q "max-page-size=16384" app/src/main/cpp/Android.mk 2>/dev/null; then
              echo "✓ 16KB page alignment configured in Android.mk"
            fi
          fi
          
          echo ""
          echo "✅ Security check completed"

  # ===========================================================================
  # ρ (RHO) - EXPANSION STAGE - ARM64 DEBUG BUILD (PRIORITY)
  # Build ARM64 debug first (highest priority architecture)
  # ===========================================================================
  rho-expansion-arm64-debug:
    name: "ρ Build ARM64 Debug (${{ matrix.variant }})"
    needs: [psi-perception, chi-feedback]
    if: |
      needs.psi-perception.outputs.should_continue == 'true' &&
      needs.psi-perception.outputs.build_debug == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: ${{ fromJson(needs.psi-perception.outputs.variants) }}

    env:
      PACKAGE_VARIANT: ${{ matrix.variant }}
      VERSION_TAG: ${{ needs.psi-perception.outputs.version_tag }}

    outputs:
      apk_path: ${{ steps.build.outputs.apk_path }}
      success: ${{ steps.build.outputs.success }}

    steps:
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v6

      - name: "☕ Setup Java"
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: "🔨 Build ARM64 Debug APK"
        id: build
        shell: bash {0}
        run: |
          echo "=========================================="
          echo "ρ EXPANSION - ARM64 Debug Build"
          echo "=========================================="
          echo ""
          echo "Architecture: arm64-v8a"
          echo "Build Type: debug"
          echo "Variant: $PACKAGE_VARIANT"
          echo ""
          
          APK_DIR_PATH="./app/build/outputs/apk/debug"
          APK_VERSION_TAG="${VERSION_TAG}-$PACKAGE_VARIANT-debug"
          
          echo "APK_DIR_PATH=$APK_DIR_PATH" >> $GITHUB_ENV
          echo "APK_VERSION_TAG=$APK_VERSION_TAG" >> $GITHUB_ENV
          
          export TERMUX_APP_VERSION_NAME="${VERSION_TAG/v/}"
          export TERMUX_APK_VERSION_TAG="$APK_VERSION_TAG"
          export TERMUX_PACKAGE_VARIANT="$PACKAGE_VARIANT"
          
          # Build with ARM64 priority
          if ./gradlew assembleDebug \
              -Pandroid.injected.build.abi=arm64-v8a \
              --no-daemon \
              --warning-mode all; then
            echo "success=true" >> $GITHUB_OUTPUT
            echo "apk_path=$APK_DIR_PATH" >> $GITHUB_OUTPUT
            echo ""
            echo "✅ ARM64 Debug build completed successfully"
          else
            echo "success=false" >> $GITHUB_OUTPUT
            echo ""
            echo "❌ ARM64 Debug build failed"
            exit 1
          fi

      - name: "📦 Upload ARM64 Debug APK"
        uses: actions/upload-artifact@v7
        with:
          name: termux-arm64-debug-${{ matrix.variant }}-${{ env.APK_VERSION_TAG }}
          path: |
            ${{ env.APK_DIR_PATH }}/*.apk
            ${{ env.APK_DIR_PATH }}/output-metadata.json
          retention-days: 30

  # ===========================================================================
  # ρ (RHO) - EXPANSION STAGE - ARM64 RELEASE BUILD
  # Build ARM64 release (after debug)
  # ===========================================================================
  rho-expansion-arm64-release:
    name: "ρ Build ARM64 Release (${{ matrix.variant }})"
    needs: [psi-perception, chi-feedback, rho-expansion-arm64-debug]
    if: |
      always() &&
      needs.psi-perception.outputs.should_continue == 'true' &&
      needs.psi-perception.outputs.build_release == 'true' &&
      (needs.rho-expansion-arm64-debug.result == 'success' || needs.rho-expansion-arm64-debug.result == 'skipped')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: ${{ fromJson(needs.psi-perception.outputs.variants) }}

    env:
      PACKAGE_VARIANT: ${{ matrix.variant }}
      VERSION_TAG: ${{ needs.psi-perception.outputs.version_tag }}

    steps:
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v6

      - name: "☕ Setup Java"
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: "🔨 Build ARM64 Release APK"
        id: build
        shell: bash {0}
        run: |
          echo "=========================================="
          echo "ρ EXPANSION - ARM64 Release Build"
          echo "=========================================="
          echo ""
          echo "Architecture: arm64-v8a"
          echo "Build Type: release"
          echo "Variant: $PACKAGE_VARIANT"
          echo ""
          
          APK_DIR_PATH="./app/build/outputs/apk/release"
          APK_VERSION_TAG="${VERSION_TAG}-$PACKAGE_VARIANT-release"
          
          echo "APK_DIR_PATH=$APK_DIR_PATH" >> $GITHUB_ENV
          echo "APK_VERSION_TAG=$APK_VERSION_TAG" >> $GITHUB_ENV
          
          export TERMUX_APP_VERSION_NAME="${VERSION_TAG/v/}"
          export TERMUX_APK_VERSION_TAG="$APK_VERSION_TAG"
          export TERMUX_PACKAGE_VARIANT="$PACKAGE_VARIANT"
          
          # Build with ARM64 priority
          if ./gradlew assembleRelease \
              -Pandroid.injected.build.abi=arm64-v8a \
              --no-daemon \
              --warning-mode all; then
            echo ""
            echo "✅ ARM64 Release build completed successfully"
          else
            echo ""
            echo "❌ ARM64 Release build failed"
            exit 1
          fi

      - name: "📦 Upload ARM64 Release APK"
        uses: actions/upload-artifact@v7
        with:
          name: termux-arm64-release-${{ matrix.variant }}-${{ env.APK_VERSION_TAG }}
          path: |
            ${{ env.APK_DIR_PATH }}/*.apk
            ${{ env.APK_DIR_PATH }}/output-metadata.json
          retention-days: 30

  # ===========================================================================
  # ρ (RHO) - EXPANSION STAGE - FULL DEBUG BUILD (ALL ABIs)
  # Build all architectures debug (after ARM64)
  # ===========================================================================
  rho-expansion-full-debug:
    name: "ρ Build Full Debug (${{ matrix.variant }})"
    needs: [psi-perception, chi-feedback, rho-expansion-arm64-debug]
    if: |
      always() &&
      needs.psi-perception.outputs.should_continue == 'true' &&
      needs.psi-perception.outputs.build_debug == 'true' &&
      (needs.rho-expansion-arm64-debug.result == 'success' || needs.rho-expansion-arm64-debug.result == 'skipped')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: ${{ fromJson(needs.psi-perception.outputs.variants) }}

    env:
      PACKAGE_VARIANT: ${{ matrix.variant }}
      VERSION_TAG: ${{ needs.psi-perception.outputs.version_tag }}

    steps:
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v6

      - name: "☕ Setup Java"
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: "🔨 Build Full Debug APKs (All ABIs)"
        id: build
        shell: bash {0}
        run: |
          echo "=========================================="
          echo "ρ EXPANSION - Full Debug Build (All ABIs)"
          echo "=========================================="
          echo ""
          echo "Architectures: universal, arm64-v8a, armeabi-v7a, x86_64, x86"
          echo "Build Type: debug"
          echo "Variant: $PACKAGE_VARIANT"
          echo ""
          
          APK_DIR_PATH="./app/build/outputs/apk/debug"
          APK_VERSION_TAG="${VERSION_TAG}-$PACKAGE_VARIANT-github-debug"
          APK_BASENAME_PREFIX="termux-app_$APK_VERSION_TAG"
          
          echo "APK_DIR_PATH=$APK_DIR_PATH" >> $GITHUB_ENV
          echo "APK_VERSION_TAG=$APK_VERSION_TAG" >> $GITHUB_ENV
          echo "APK_BASENAME_PREFIX=$APK_BASENAME_PREFIX" >> $GITHUB_ENV
          
          export TERMUX_APP_VERSION_NAME="${VERSION_TAG/v/}"
          export TERMUX_APK_VERSION_TAG="$APK_VERSION_TAG"
          export TERMUX_PACKAGE_VARIANT="$PACKAGE_VARIANT"
          
          # Build all ABIs
          if ! ./gradlew assembleDebug --no-daemon; then
            echo "❌ Build failed"
            exit 1
          fi
          
          echo ""
          echo "Validating APKs..."
          for abi in universal arm64-v8a armeabi-v7a x86_64 x86; do
            if test -f "$APK_DIR_PATH/${APK_BASENAME_PREFIX}_$abi.apk"; then
              echo "✓ Found: ${APK_BASENAME_PREFIX}_$abi.apk"
            else
              echo "⚠ Missing: ${APK_BASENAME_PREFIX}_$abi.apk"
            fi
          done
          
          echo ""
          echo "Generating checksums..."
          cd "$APK_DIR_PATH"
          if ls *.apk 1>/dev/null 2>&1; then
            sha256sum *.apk > sha256sums.txt
            echo "✅ Checksums generated"
          fi
          
          echo ""
          echo "✅ Full debug build completed"

      - name: "📦 Upload Universal APK"
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.APK_BASENAME_PREFIX }}_universal
          path: |
            ${{ env.APK_DIR_PATH }}/${{ env.APK_BASENAME_PREFIX }}_universal.apk
            ${{ env.APK_DIR_PATH }}/output-metadata.json

      - name: "📦 Upload ARM64-v8a APK"
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.APK_BASENAME_PREFIX }}_arm64-v8a
          path: |
            ${{ env.APK_DIR_PATH }}/${{ env.APK_BASENAME_PREFIX }}_arm64-v8a.apk
            ${{ env.APK_DIR_PATH }}/output-metadata.json

      - name: "📦 Upload ARMv7a APK"
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.APK_BASENAME_PREFIX }}_armeabi-v7a
          path: |
            ${{ env.APK_DIR_PATH }}/${{ env.APK_BASENAME_PREFIX }}_armeabi-v7a.apk
            ${{ env.APK_DIR_PATH }}/output-metadata.json

      - name: "📦 Upload x86_64 APK"
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.APK_BASENAME_PREFIX }}_x86_64
          path: |
            ${{ env.APK_DIR_PATH }}/${{ env.APK_BASENAME_PREFIX }}_x86_64.apk
            ${{ env.APK_DIR_PATH }}/output-metadata.json

      - name: "📦 Upload x86 APK"
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.APK_BASENAME_PREFIX }}_x86
          path: |
            ${{ env.APK_DIR_PATH }}/${{ env.APK_BASENAME_PREFIX }}_x86.apk
            ${{ env.APK_DIR_PATH }}/output-metadata.json

      - name: "📦 Upload Checksums"
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.APK_BASENAME_PREFIX }}_sha256sums
          path: ${{ env.APK_DIR_PATH }}/sha256sums.txt

  # ===========================================================================
  # Δ (DELTA) - VALIDATION STAGE
  # Run unit tests
  # ===========================================================================
  delta-validation:
    name: "Δ Validation - Unit Tests"
    needs: [psi-perception, chi-feedback]
    if: |
      needs.psi-perception.outputs.should_continue == 'true' &&
      github.event.inputs.skip_tests != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v6

      - name: "☕ Setup Java"
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: "🧪 Run Unit Tests"
        run: |
          echo "=========================================="
          echo "Δ VALIDATION - Unit Tests"
          echo "=========================================="
          echo ""
          
          ./gradlew test --no-daemon
          
          echo ""
          echo "✅ Unit tests completed"

      - name: "📊 Upload Test Results"
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: |
            app/build/reports/tests/
            terminal-emulator/build/reports/tests/
            terminal-view/build/reports/tests/
            termux-shared/build/reports/tests/
          retention-days: 7

  # ===========================================================================
  # Σ (SIGMA) - EXECUTION STAGE
  # Android 15 compatibility validation
  # ===========================================================================
  sigma-execution:
    name: "Σ Execution - Compatibility Check"
    needs: [psi-perception, rho-expansion-arm64-debug, delta-validation]
    if: |
      always() &&
      needs.psi-perception.outputs.should_continue == 'true' &&
      (needs.rho-expansion-arm64-debug.result == 'success' || needs.rho-expansion-arm64-debug.result == 'skipped')
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v6

      - name: "☕ Setup Java"
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: "🔍 Android 15 Compatibility Validation"
        run: |
          echo "=========================================="
          echo "Σ EXECUTION - Compatibility Validation"
          echo "=========================================="
          echo ""
          
          # Run validation tasks (allow failures for non-blocking)
          set +e
          ./gradlew validateAndroid15Compatibility --no-daemon
          RESULT=$?
          set -e
          
          if [ $RESULT -ne 0 ]; then
            echo ""
            echo "⚠ Validation completed with warnings"
          else
            echo ""
            echo "✅ All validations passed"
          fi

  # ===========================================================================
  # Ω (OMEGA) - ALIGNMENT STAGE
  # Final quality report and summary
  # ===========================================================================
  omega-alignment:
    name: "Ω Alignment - Quality Report"
    needs: [psi-perception, chi-feedback, rho-expansion-arm64-debug, rho-expansion-arm64-release, rho-expansion-full-debug, delta-validation, sigma-execution]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v6

      - name: "📊 Generate Quality Report"
        run: |
          echo "=========================================="
          echo "Ω ALIGNMENT - Final Quality Report"
          echo "=========================================="
          echo ""
          echo "RAFAELIA Pipeline Summary (ψχρΔΣΩ)"
          echo "-------------------------------------------"
          echo ""
          echo "Pipeline Stages:"
          echo "  ψ Perception:          ${{ needs.psi-perception.result }}"
          echo "  χ Feedback:            ${{ needs.chi-feedback.result }}"
          echo "  ρ ARM64 Debug:         ${{ needs.rho-expansion-arm64-debug.result }}"
          echo "  ρ ARM64 Release:       ${{ needs.rho-expansion-arm64-release.result }}"
          echo "  ρ Full Debug:          ${{ needs.rho-expansion-full-debug.result }}"
          echo "  Δ Validation (Tests):  ${{ needs.delta-validation.result }}"
          echo "  Σ Execution:           ${{ needs.sigma-execution.result }}"
          echo ""
          
          # Determine overall status
          if [ "${{ needs.rho-expansion-arm64-debug.result }}" == "success" ] || \
             [ "${{ needs.rho-expansion-full-debug.result }}" == "success" ]; then
            echo "✅ PIPELINE COMPLETED - APK(s) Generated Successfully"
            echo ""
            echo "Quality Metrics:"
            echo "  - ARM64 Priority Build: ENABLED"
            echo "  - 16KB Page Alignment: CONFIGURED"
            echo "  - Android 15 Compatibility: CHECKED"
          else
            echo "⚠ PIPELINE COMPLETED WITH ISSUES"
            echo ""
            echo "Review the job outputs above for details."
          fi
          
          echo ""
          echo "=========================================="
          echo "Generated: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "=========================================="

      - name: "✅ Verify Authorship (RAFAELIA)"
        run: |
          echo ""
          echo "Authorship Verification:"
          RAFAEL_COUNT=$(grep -r "instituto-Rafael" . --include="*.md" --include="*.yml" --include="*.java" 2>/dev/null | wc -l || echo "0")
          RAFAELIA_COUNT=$(grep -r "RAFAELIA" . --include="*.md" --include="*.yml" --include="*.java" 2>/dev/null | wc -l || echo "0")
          
          echo "  - instituto-Rafael mentions: $RAFAEL_COUNT"
          echo "  - RAFAELIA references: $RAFAELIA_COUNT"
          echo ""
          
          if [ -f LICENSE.md ]; then
            echo "✅ License file present"
          else
            echo "⚠ License file not found"
          fi
