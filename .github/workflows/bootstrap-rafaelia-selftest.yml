name: bootstrap-rafaelia-selftest

on:
  workflow_dispatch:
  push:
    paths:
      - 'bootstrap_rafaelia/**'
      - '.github/workflows/bootstrap-rafaelia-selftest.yml'

jobs:
  selftest:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Build host-smoke
        run: make -C bootstrap_rafaelia clean host-smoke
      - name: Upload host log
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-rafaelia-selftest-log
          path: bootstrap_rafaelia/selftest.log

  ndk-freestanding-aarch64:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: android-actions/setup-android@v3
      - name: Resolve NDK version
        id: ndk
        run: |
          NDK_VERSION=$(grep -E '^ndkVersion=' gradle.properties | head -n1 | cut -d= -f2- | tr -d '[:space:]')
          echo "ndk=$NDK_VERSION" >> "$GITHUB_OUTPUT"
      - name: Install NDK
        run: sdkmanager "ndk;${{ steps.ndk.outputs.ndk }}"
      - name: Build arm64-freestanding objects
        env:
          NDK: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ steps.ndk.outputs.ndk }}
        run: |
          export PATH="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH"
          make -C bootstrap_rafaelia clean arm64-freestanding
      - name: Upload arm64 objects
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-rafaelia-arm64-freestanding-objects
          path: |
            bootstrap_rafaelia/raf_main.o
            bootstrap_rafaelia/entry_arm64.o
