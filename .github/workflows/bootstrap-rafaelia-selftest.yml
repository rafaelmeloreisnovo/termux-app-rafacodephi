name: bootstrap-rafaelia-selftest

on:
  workflow_dispatch:
  push:
    paths:
      - 'bootstrap_rafaelia/**'
      - '.github/workflows/bootstrap-rafaelia-selftest.yml'

jobs:
  selftest:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Build host-smoke
        run: make -C bootstrap_rafaelia host-smoke | tee bootstrap_rafaelia_selftest.log
      - name: Upload log
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-rafaelia-selftest-log
          path: bootstrap_rafaelia_selftest.log
