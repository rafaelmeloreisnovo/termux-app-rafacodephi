name: RAFAELIA Pipeline (proot-distro)
on:
  workflow_dispatch:
  push:
    paths:
      - 'rafaelia/**'
      - '.github/workflows/rafaelia_pipeline.yml'

jobs:
  sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck (rafaelia tools)
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck -x rafaelia/tools/*.sh
