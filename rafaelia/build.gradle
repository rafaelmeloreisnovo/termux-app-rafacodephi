plugins {
  id 'com.android.library'
}

android {
  namespace = "com.termux.rafaelia"
  
  compileSdk = project.properties.compileSdkVersion.toInteger()
  ndkVersion = System.getenv("JITPACK_NDK_VERSION") ?: project.properties.ndkVersion

  defaultConfig {
    minSdk = project.properties.minSdkVersion.toInteger()
    targetSdk = project.properties.targetSdkVersion.toInteger()
    
    externalNativeBuild {
      ndkBuild {
        cFlags "-std=c11", "-Wall", "-Wextra", "-Werror", "-Os", "-fno-stack-protector"
      }
    }

    testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
  }

  externalNativeBuild {
    ndkBuild {
      path "src/main/cpp/Android.mk"
    }
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  testOptions {
    unitTests {
      returnDefaultValues = true
      all {
        // Enable unit tests - tests that require native libraries
        // will be mocked or skipped via @Ignore annotations
        enabled = true
      }
    }
  }
}

dependencies {
  testImplementation 'junit:junit:4.13.2'
}
